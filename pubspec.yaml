name: corebussiness
description: "CoreBusiness - Production-grade personal finance management application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  rxdart: ^0.28.0

  # Navigation
  go_router: ^14.6.2

  # Dependency Injection (manual service locator — no codegen)
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0

  # Auth
  google_sign_in: ^6.2.2

  # Charts
  fl_chart: ^0.69.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Functional Programming (Either<Failure, T> pattern)
  dartz: ^0.10.1

  # Utilities
  intl: ^0.19.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  flutter_dotenv: ^6.0.1
  image_picker: ^1.2.2
  google_generative_ai: ^0.4.7
  flutter_local_notifications: ^17.2.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  crypto: ^3.0.6

  # PDF Generation & Export
  pdf: ^3.11.2
  printing: ^5.13.4
  flutter_lucide_animated: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Testing — mocktail replaces mockito, no codegen needed
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/
